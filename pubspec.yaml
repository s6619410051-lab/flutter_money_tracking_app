name: flutter_money_tracking_app
description: "แอปบันทึกรายรับรายจ่าย เชื่อมต่อกับ Supabase"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase Flutter SDK — ใช้เชื่อมต่อกับ Supabase (Database, Auth, Storage)
  supabase_flutter: ^2.3.4

  # Google Fonts — ใช้ฟอนต์ Prompt (รองรับภาษาไทย)
  google_fonts: ^6.2.1

  # intl — ใช้จัดรูปแบบวันที่และตัวเลขเงิน
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true